<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angèle - ARCHIVE_01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <nav class="top-nav">
            <div class="nav-left">
                <a href="index.html" class="nav-logo">ARCHIVE_01</a>
                <a href="index.html#manifest">Manifest</a>
                <a href="index.html#tracklist">Tracklist</a>
            </div>
            <div class="nav-right">
                <a href="tournee.html">Tournée</a>
                <a href="shop.html">Shop</a>
                <div class="hamburger-menu">☰</div>
            </div>
        </nav>

        <main>
            <section id="archive" class="section-home">
                
                <div class="hero-image-container">
                    <img src="images/angele-main.jpg" alt="Angèle" class="hero-img">
                    
                    <div class="polaroids-container">
                        <div class="polaroid-combined-pair">
                            <div class="polaroid-inner">
                                <img src="images/polaroid0905new.png" alt="polaroids 09 05 new" class="combined-img">
                            </div>
                        </div>
                        
                        <div class="polaroid p-fracture">
                            <div class="polaroid-inner">
                                <img src="images/polaroid-fracture.png" alt="Polaroid FRACTURE">
                            </div>
                        </div>
                    </div>
                </div>
                
                <section id="manifest" class="section-manifest">
                    <img src="images/manifest.svg" alt="Manifest" class="manifest-img">
                </section>

            </section>

            <section id="tracklist" class="section-tracklist">
                
                <div class="media-container">
                    <audio id="site-audio" src="audio/audio_web_angele.MP3" loop></audio>

                    <div class="audio-waves-bg">
                        <div class="waves-content">
                            <img src="images/audio-waves.svg" alt="Audio Waves" class="waves-img" id="wave-visual">
                            <img src="images/micoff.svg" alt="Mute" class="mute-btn" id="mute-toggle">
                        </div>
                    </div>
                    
                    <img src="images/cassette.png" alt="Cassette Angèle" class="cassette-img">
                </div>
                
                <img src="images/tracklist.svg" alt="Tracklist" class="tracklist-svg">
                
            </section>

            <section id="shop-preview" class="section-shop-preview">
                <div class="shop-preview-container">
                    <a href="shop.html" class="preview-polaroid">
                        <img src="images/pvinylehome.png" alt="Vinyle Shop Preview">
                    </a>
                    <a href="shop.html" class="preview-polaroid preview-center">
                        <img src="images/pvestehome.png" alt="Veste Shop Preview">
                    </a>
                    <a href="shop.html" class="preview-polaroid">
                        <img src="images/pcassettehome.png" alt="Cassette Shop Preview">
                    </a>
                </div>
            </section>
            
        </main>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="index.html">Archive_01</a>
                <a href="index.html#manifest">Manifest</a>
                <a href="index.html#tracklist">Tracklist</a>
                <a href="tournee.html">Tournée</a>
                <a href="shop.html">Shop</a>
            </div>
            <div class="footer-copy">
                &copy; 2026 Angèle Tout droits réservés
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
